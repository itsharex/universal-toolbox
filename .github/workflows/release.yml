# GitHub Actions：多平台自动构建与发布工作流
# 触发条件：推送 v* 格式标签时自动执行
# 输出：
#   Windows → xtool_Setup.exe（NSIS 安装包）+ xtool.exe（单文件）
#   Linux   → xtool_linux_amd64.deb + xtool_linux_amd64.tar.gz
#   macOS   → xtool_macos_amd64.dmg + xtool_macos_arm64.dmg

name: 🚀 多平台构建与发布

on:
  push:
    tags:
      - 'v*'
  # 手动触发（方便调试）
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v1.0.1）'
        required: false
        default: 'dev'

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'
  WAILS_VERSION: 'v2.12.0'
  APP_NAME: 'XTool'
  APP_NAME_EN: 'xtool'

jobs:
  # ============================================================
  # Windows 构建：生成 .exe 单文件 + NSIS 安装包
  # ============================================================
  build-windows:
    name: 🪟 Windows 构建 (amd64)
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 诊断工具链版本
        shell: pwsh
        run: |
          Write-Host "Go: $(go version)"
          Write-Host "Node: $(node --version)"
          Write-Host "npm: $(npm --version)"

      - name: 整理 Go 模块依赖
        shell: pwsh
        run: go mod tidy

      - name: 安装 Wails CLI ${{ env.WAILS_VERSION }}
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: 验证 Wails 安装
        shell: pwsh
        run: wails version

      - name: 安装前端依赖
        working-directory: frontend
        shell: pwsh
        run: npm install

      - name: 显式生成前端绑定
        shell: pwsh
        run: |
          wails generate bindings
          if ($LASTEXITCODE -ne 0) {
            Write-Error "wails generate bindings 失败"
            exit 1
          }
          if (-not (Test-Path "frontend/wailsjs/go/models.ts")) {
            Write-Error "bindings 未生成：frontend/wailsjs/go/models.ts 不存在"
            exit 1
          }
          Write-Host "bindings 生成成功"

      - name: 构建 Windows 单文件可执行程序
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          try {
            wails build -platform windows/amd64 -ldflags "-s" -o "${{ env.APP_NAME_EN }}.exe"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "wails build 失败，退出码: $LASTEXITCODE"
              exit 1
            }
            Write-Host "构建完成"
          } catch {
            Write-Error "构建异常: $_"
            exit 1
          }

      - name: 验证构建产物
        shell: pwsh
        run: |
          Write-Host "build\bin 目录内容："
          Get-ChildItem -Path "build\bin" | Format-Table Name, Length -AutoSize
          $expected = "build\bin\${{ env.APP_NAME_EN }}.exe"
          if (Test-Path $expected) {
            $file = Get-Item $expected
            Write-Host "构建成功: $($file.FullName)，大小: $($file.Length) 字节"
          } else {
            Write-Error "构建产物未找到: $expected"
            Get-ChildItem -Path "build" -Recurse -ErrorAction SilentlyContinue | Format-Table FullName -AutoSize
            exit 1
          }

      - name: 安装 NSIS
        uses: negrutiu/nsis-install@v2
        with:
          distro: 'negrutiu'
          arch: 'x86'
          register-path: true

      - name: 生成 NSIS 安装脚本
        shell: pwsh
        run: |
          $exeName = "${{ env.APP_NAME_EN }}.exe"
          $exePath = "build\bin\$exeName"
          if (-not (Test-Path $exePath)) {
            Write-Error "Build output not found: $exePath"
            exit 1
          }
          $fileInfo = Get-Item $exePath
          Write-Host "Build verified: $($fileInfo.FullName) ($($fileInfo.Length) bytes)"

          $version = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $version) { $version = "1.0.0" }

          $appName = "${{ env.APP_NAME }}"
          $appNameEn = "${{ env.APP_NAME_EN }}"
          $setupExe = "build\bin\$($appNameEn)_Setup.exe"

          $nsisLines = @(
            "; XTool NSIS Install Script"
            "; Auto-generated, do not edit manually"
            ""
            "!define APP_NAME '$appName'"
            "!define APP_VERSION '$version'"
            "!define APP_PUBLISHER 'MasterPick'"
            "!define APP_URL 'https://github.com/MasterPick/xtool'"
            "!define APP_EXE '$appNameEn.exe'"
            "!define INSTALL_DIR `$PROGRAMFILES64\$appName"
            ""
            "Name `${APP_NAME} v`${APP_VERSION}"
            "OutFile '$setupExe'"
            "Unicode True"
            "InstallDir '${INSTALL_DIR}'"
            "InstallDirRegKey HKLM 'Software\${APP_NAME}' ''"
            "RequestExecutionLevel admin"
            "SetCompressor /SOLID lzma"
            ""
            "!include 'MUI2.nsh'"
            ""
            "!define MUI_ABORTWARNING"
            "!define MUI_ABORTWARNING_TEXT '确定要退出安装吗？'"
            ""
            "!define MUI_ICON `"`$NSISDIR\Contrib\Graphics\Icons\modern-install.ico`""
            "!define MUI_UNICON `"`$NSISDIR\Contrib\Graphics\Icons\modern-uninstall.ico`""
            "!define MUI_WELCOMEFINISHPAGE_BITMAP `"`$NSISDIR\Contrib\Graphics\Wizard\win.bmp`""
            "!define MUI_WELCOMEFINISHPAGE_BITMAP_NOSTRETCH"
            "!define MUI_HEADERIMAGE"
            "!define MUI_HEADERIMAGE_BITMAP `"`$NSISDIR\Contrib\Graphics\Header\win.bmp`""
            "!define MUI_HEADERIMAGE_BITMAP_NOSTRETCH"
            ""
            "!define MUI_COMPONENTSPAGE_NODESC"
            ""
            "!define MUI_WELCOMEPAGE_TITLE '欢迎使用 ${APP_NAME} ${APP_VERSION} 安装向导'"
            "!define MUI_WELCOMEPAGE_TEXT '感谢您选择 ${APP_NAME}！`$n`$n${APP_NAME} 是一站式桌面工具集，包含开发工具、系统工具、日常工具、网络工具等30+实用功能。`$n`$n点击「下一步」开始安装。'"
            ""
            "!define MUI_DIRECTORYPAGE_TEXT_TOP '安装程序将把 ${APP_NAME} 安装到以下目录。`$n`$n默认路径：`${INSTALL_DIR}`'"
            "!define MUI_DIRECTORYPAGE_TEXT_DESTINATION '目标文件夹'"
            ""
            "!define MUI_FINISHPAGE_TITLE '${APP_NAME} 安装完成！'"
            "!define MUI_FINISHPAGE_TEXT '${APP_NAME} 已成功安装到您的计算机。`$n`$n现在您可以运行 ${APP_NAME} 了。'"
            "!define MUI_FINISHPAGE_RUN '`$INSTDIR\${APP_EXE}'"
            "!define MUI_FINISHPAGE_RUN_TEXT '运行 ${APP_NAME}'"
            "!define MUI_FINISHPAGE_RUN_NOTCHECKED"
            "!define MUI_FINISHPAGE_SHOWREADME 'https://github.com/MasterPick/xtool'"
            "!define MUI_FINISHPAGE_SHOWREADME_TEXT '访问 GitHub 主页'"
            ""
            "!insertmacro MUI_PAGE_WELCOME"
            "!insertmacro MUI_PAGE_LICENSE 'LICENSE'"
            "!insertmacro MUI_PAGE_DIRECTORY"
            "!insertmacro MUI_PAGE_INSTFILES"
            "!insertmacro MUI_PAGE_FINISH"
            ""
            "!insertmacro MUI_UNPAGE_CONFIRM"
            "!insertmacro MUI_UNPAGE_INSTFILES"
            ""
            "!insertmacro MUI_LANGUAGE 'SimpChinese'"
            ""
            "Section 'Main' SecMain"
            "  SectionIn RO"
            "  SetOutPath '`$INSTDIR'"
            "  File 'build\bin\${APP_EXE}'"
            "  File 'README.md'"
            "  File 'LICENSE'"
            ""
            "  CreateShortcut '`$DESKTOP\${APP_NAME}.lnk' '`$INSTDIR\${APP_EXE}'"
            "  CreateDirectory '`$SMPROGRAMS\${APP_NAME}'"
            "  CreateShortcut '`$SMPROGRAMS\${APP_NAME}\${APP_NAME}.lnk' '`$INSTDIR\${APP_EXE}'"
            "  CreateShortcut '`$SMPROGRAMS\${APP_NAME}\Uninstall.lnk' '`$INSTDIR\Uninstall.exe'"
            "  CreateShortcut '`$SMPROGRAMS\${APP_NAME}\GitHub 主页.url' '`$https://github.com/MasterPick/xtool'"
            ""
            "  WriteRegStr HKLM 'Software\${APP_NAME}' '' '`$INSTDIR'"
            "  WriteRegStr HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'DisplayName' '${APP_NAME}'"
            "  WriteRegStr HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'UninstallString' '`$INSTDIR\Uninstall.exe'"
            "  WriteRegStr HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'DisplayVersion' '${APP_VERSION}'"
            "  WriteRegStr HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'Publisher' '${APP_PUBLISHER}'"
            "  WriteRegStr HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'URLInfoAbout' '${APP_URL}'"
            "  WriteRegStr HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'HelpLink' '${APP_URL}'"
            "  WriteRegDWORD HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'NoModify' 1"
            "  WriteRegDWORD HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}' 'NoRepair' 1"
            ""
            "  WriteUninstaller '`$INSTDIR\Uninstall.exe'"
            "SectionEnd"
            ""
            "Section 'Uninstall'"
            "  Delete '`$INSTDIR\${APP_EXE}'"
            "  Delete '`$INSTDIR\README.md'"
            "  Delete '`$INSTDIR\LICENSE'"
            "  Delete '`$INSTDIR\Uninstall.exe'"
            "  RMDir '`$INSTDIR'"
            "  Delete '`$DESKTOP\${APP_NAME}.lnk'"
            "  Delete '`$SMPROGRAMS\${APP_NAME}\${APP_NAME}.lnk'"
            "  Delete '`$SMPROGRAMS\${APP_NAME}\Uninstall.lnk'"
            "  Delete '`$SMPROGRAMS\${APP_NAME}\GitHub 主页.url'"
            "  RMDir '`$SMPROGRAMS\${APP_NAME}'"
            "  DeleteRegKey HKLM 'Software\${APP_NAME}'"
            "  DeleteRegKey HKLM 'Software\Microsoft\Windows\CurrentVersion\Uninstall\${APP_NAME}'"
            "SectionEnd"
          )
          $nsisScript = $nsisLines -join "`n"

          $utf8Bom = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText("$PWD\installer.nsi", $nsisScript, $utf8Bom)
          Write-Host "NSIS script generated"

          Write-Host "`n===== Key NSIS lines ====="
          Get-Content "installer.nsi" | Select-String "APP_EXE|File |Unicode|nsisdir" | ForEach-Object { Write-Host $_.Line.Trim() }

      - name: 编译 NSIS 安装包
        shell: pwsh
        run: |
          Write-Host "使用 makensis 编译安装包"
          & makensis /NOCD installer.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Error "NSIS 编译失败，退出码: $LASTEXITCODE"
            exit 1
          }
          Write-Host "NSIS 编译完成"
          Get-ChildItem -Path "build\bin" | Format-Table Name, Length -AutoSize

      - name: 计算文件哈希值
        shell: pwsh
        run: |
          $exeHash = (Get-FileHash "build\bin\${{ env.APP_NAME_EN }}.exe" -Algorithm SHA256).Hash
          $setupHash = (Get-FileHash "build\bin\${{ env.APP_NAME_EN }}_Setup.exe" -Algorithm SHA256).Hash
          Write-Host "exe SHA256: $exeHash"
          Write-Host "Setup SHA256: $setupHash"
          "$exeHash  ${{ env.APP_NAME_EN }}.exe`n$setupHash  ${{ env.APP_NAME_EN }}_Setup.exe" | Out-File "build\bin\windows_checksums.txt" -Encoding UTF8

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/bin/${{ env.APP_NAME_EN }}.exe
            build/bin/${{ env.APP_NAME_EN }}_Setup.exe
            build/bin/windows_checksums.txt
          retention-days: 7

  # ============================================================
  # Linux 构建：生成 .deb 包 + tar.gz 压缩包
  # ============================================================
  build-linux:
    name: 🐧 Linux 构建 (amd64)
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 诊断工具链版本
        run: |
          echo "Go: $(go version)"
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            gcc \
            pkg-config \
            dpkg-dev \
            fakeroot
          echo "系统依赖安装完成"

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI ${{ env.WAILS_VERSION }}
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: 验证 Wails 安装
        run: wails version

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 显式生成前端绑定
        run: |
          wails generate bindings
          if [ $? -ne 0 ]; then
            echo "ERROR: wails generate bindings 失败"
            exit 1
          fi
          if [ ! -f "frontend/wailsjs/go/models.ts" ]; then
            echo "ERROR: bindings 未生成：frontend/wailsjs/go/models.ts 不存在"
            exit 1
          fi
          echo "bindings 生成成功"

      - name: 构建 Linux 可执行文件
        run: |
          set -e
          wails build -platform linux/amd64 -ldflags "-s" -o "${{ env.APP_NAME_EN }}"
          echo "Linux 构建完成"
          ls -la build/bin/

      - name: 验证构建产物
        run: |
          if [ ! -f "build/bin/${{ env.APP_NAME_EN }}" ]; then
            echo "ERROR: 构建产物未找到: build/bin/${{ env.APP_NAME_EN }}"
            find build/ -type f 2>/dev/null || true
            exit 1
          fi
          echo "构建产物验证成功"
          ls -lh build/bin/${{ env.APP_NAME_EN }}

      - name: 打包为 tar.gz
        run: |
          cd build/bin
          tar -czf ${{ env.APP_NAME_EN }}_linux_amd64.tar.gz ${{ env.APP_NAME_EN }}
          echo "tar.gz 打包完成"

      - name: 制作 .deb 安装包
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi

          DEB_DIR="${{ env.APP_NAME_EN }}_${VERSION}_amd64"
          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"
          mkdir -p "$DEB_DIR/usr/share/doc/${{ env.APP_NAME_EN }}"

          cp build/bin/${{ env.APP_NAME_EN }} "$DEB_DIR/usr/bin/"
          chmod +x "$DEB_DIR/usr/bin/${{ env.APP_NAME_EN }}"

          cp README.md "$DEB_DIR/usr/share/doc/${{ env.APP_NAME_EN }}/"
          cp LICENSE "$DEB_DIR/usr/share/doc/${{ env.APP_NAME_EN }}/"

          cat > "$DEB_DIR/usr/share/applications/${{ env.APP_NAME_EN }}.desktop" << 'DESKTOP_EOF'
[Desktop Entry]
Version=${VERSION}
Name=XTool
Name[zh_CN]=XTool
Comment=一站式桌面工具集
Comment[zh_CN]=一站式桌面工具集，功能丰富、启动快、界面现代
Exec=/usr/bin/xtool
Icon=xtool
Terminal=false
Type=Application
Categories=Utility;Development;
Keywords=toolbox;tools;developer;xtool;
StartupNotify=true
DESKTOP_EOF

          cat > "$DEB_DIR/DEBIAN/control" << CONTROL_EOF
Package: ${{ env.APP_NAME_EN }}
Version: ${VERSION}
Section: utils
Priority: optional
Architecture: amd64
Maintainer: MasterPick <masterpickself@outlook.com>
Homepage: https://github.com/MasterPick/xtool
Description: XTool - 一站式桌面工具集
 功能丰富的跨平台桌面工具集，包含开发工具、系统工具、
 日常工具、网络工具等30+实用功能。
 .
 技术栈：Wails v2 + Go + Vue3 + TypeScript + TailwindCSS
CONTROL_EOF

          cat > "$DEB_DIR/DEBIAN/postinst" << 'POSTINST_EOF'
#!/bin/bash
set -e
update-desktop-database /usr/share/applications 2>/dev/null || true
echo "XTool 安装完成！可在应用菜单中找到，或运行：xtool"
POSTINST_EOF
          chmod 755 "$DEB_DIR/DEBIAN/postinst"

          cat > "$DEB_DIR/DEBIAN/prerm" << 'PRERM_EOF'
#!/bin/bash
set -e
echo "正在卸载 XTool..."
PRERM_EOF
          chmod 755 "$DEB_DIR/DEBIAN/prerm"

          INSTALLED_SIZE=$(du -sk "$DEB_DIR" | cut -f1)
          echo "Installed-Size: $INSTALLED_SIZE" >> "$DEB_DIR/DEBIAN/control"

          fakeroot dpkg-deb --build "$DEB_DIR" "build/bin/${{ env.APP_NAME_EN }}_${VERSION}_amd64.deb"
          echo ".deb 包制作完成"
          ls -la build/bin/

      - name: 计算文件哈希值
        run: |
          cd build/bin
          sha256sum ${{ env.APP_NAME_EN }}_linux_amd64.tar.gz >> linux_checksums.txt
          sha256sum *.deb >> linux_checksums.txt
          cat linux_checksums.txt

      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/bin/${{ env.APP_NAME_EN }}_linux_amd64.tar.gz
            build/bin/*.deb
            build/bin/linux_checksums.txt
          retention-days: 7

  # ============================================================
  # macOS 构建：生成 .dmg 安装镜像
  # ============================================================
  build-macos:
    name: 🍎 macOS 构建 (amd64 + arm64)
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 诊断工具链版本
        run: |
          echo "Go: $(go version)"
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "GOARCH: $GOARCH"

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI ${{ env.WAILS_VERSION }}
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: 验证 Wails 安装
        run: wails version

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 显式生成前端绑定
        run: |
          wails generate bindings
          if [ $? -ne 0 ]; then
            echo "ERROR: wails generate bindings 失败"
            exit 1
          fi
          if [ ! -f "frontend/wailsjs/go/models.ts" ]; then
            echo "ERROR: bindings 未生成"
            exit 1
          fi
          echo "bindings 生成成功"

      - name: 构建 macOS Intel (amd64) 应用
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          set -e
          # 输出到独立目录避免与 arm64 冲突
          wails build -platform darwin/amd64 -ldflags "-s" -o "build/bin/${{ env.APP_NAME_EN }}_amd64"
          echo "macOS amd64 构建完成"
          ls -la build/bin/

      - name: 验证 amd64 产物
        run: |
          if [ ! -f "build/bin/${{ env.APP_NAME_EN }}_amd64" ]; then
            echo "ERROR: amd64 构建产物未找到"
            find build/ -type f 2>/dev/null || true
            exit 1
          fi
          echo "amd64 产物验证成功"

      - name: 构建 macOS Apple Silicon (arm64) 应用
        env:
          GOARCH: arm64
          CGO_ENABLED: 1
        run: |
          set -e
          # 输出到独立目录避免覆盖 amd64
          wails build -platform darwin/arm64 -ldflags "-s" -o "build/bin/${{ env.APP_NAME_EN }}_arm64"
          echo "macOS arm64 构建完成"
          ls -la build/bin/

      - name: 验证 arm64 产物
        run: |
          if [ ! -f "build/bin/${{ env.APP_NAME_EN }}_arm64" ]; then
            echo "ERROR: arm64 构建产物未找到"
            find build/ -type f 2>/dev/null || true
            exit 1
          fi
          echo "arm64 产物验证成功"

      - name: 打包 Intel DMG
        run: |
          if [ -f "build/bin/${{ env.APP_NAME_EN }}_amd64" ]; then
            # macOS 可执行文件需要包装成 .app 才能制作 DMG
            mkdir -p "build/bin/${{ env.APP_NAME_EN }}.app/Contents/MacOS"
            cp "build/bin/${{ env.APP_NAME_EN }}_amd64" "build/bin/${{ env.APP_NAME_EN }}.app/Contents/MacOS/${{ env.APP_NAME_EN }}"
            chmod +x "build/bin/${{ env.APP_NAME_EN }}.app/Contents/MacOS/${{ env.APP_NAME_EN }}"

            hdiutil create \
              -volname "${{ env.APP_NAME_EN }}" \
              -srcfolder "build/bin/${{ env.APP_NAME_EN }}.app" \
              -ov \
              -format UDZO \
              -imagekey zlib-level=9 \
              "build/bin/${{ env.APP_NAME_EN }}_macos_amd64.dmg"

            rm -rf "build/bin/${{ env.APP_NAME_EN }}.app"
            echo "Intel DMG 创建完成"
          else
            echo "WARNING: amd64 binary not found, skipping Intel DMG"
            exit 1
          fi

      - name: 打包 Apple Silicon DMG
        run: |
          if [ -f "build/bin/${{ env.APP_NAME_EN }}_arm64" ]; then
            mkdir -p "build/bin/${{ env.APP_NAME_EN }}.app/Contents/MacOS"
            cp "build/bin/${{ env.APP_NAME_EN }}_arm64" "build/bin/${{ env.APP_NAME_EN }}.app/Contents/MacOS/${{ env.APP_NAME_EN }}"
            chmod +x "build/bin/${{ env.APP_NAME_EN }}.app/Contents/MacOS/${{ env.APP_NAME_EN }}"

            hdiutil create \
              -volname "${{ env.APP_NAME_EN }}" \
              -srcfolder "build/bin/${{ env.APP_NAME_EN }}.app" \
              -ov \
              -format UDZO \
              -imagekey zlib-level=9 \
              "build/bin/${{ env.APP_NAME_EN }}_macos_arm64.dmg"

            rm -rf "build/bin/${{ env.APP_NAME_EN }}.app"
            echo "Apple Silicon DMG 创建完成"
          else
            echo "WARNING: arm64 binary not found, skipping ARM64 DMG"
            exit 1
          fi

      - name: 验证 DMG 产物
        run: |
          echo "DMG 产物列表："
          ls -lh build/bin/*.dmg
          if [ ! -f "build/bin/${{ env.APP_NAME_EN }}_macos_amd64.dmg" ] || [ ! -f "build/bin/${{ env.APP_NAME_EN }}_macos_arm64.dmg" ]; then
            echo "ERROR: DMG 产物缺失"
            exit 1
          fi

      - name: 计算文件哈希值
        run: |
          cd build/bin
          shasum -a 256 *.dmg > macos_checksums.txt
          cat macos_checksums.txt

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            build/bin/*.dmg
            build/bin/macos_checksums.txt
          retention-days: 7

  # ============================================================
  # 创建 GitHub Release，汇总所有平台安装包
  # ============================================================
  release:
    name: 📦 创建 GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: 查看构建产物列表
        run: |
          echo "========== 构建产物列表 =========="
          find dist/ -type f | sort
          echo "=================================="

      - name: 整理构建产物
        run: |
          mkdir -p release-files
          find dist/ -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*checksums*" \) \
            -exec cp {} release-files/ \;

          echo "========== 待发布文件 =========="
          ls -la release-files/
          echo "================================"

      - name: 合并校验和文件
        run: |
          cat release-files/*checksums* > release-files/checksums_all.txt 2>/dev/null || true
          echo "合并校验和完成"
          cat release-files/checksums_all.txt

      - name: 提取版本号
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传安装包
        uses: softprops/action-gh-release@v2
        with:
          name: "🎉 XTool ${{ github.ref_name }}"
          body: |
            ## XTool ${{ github.ref_name }}

            > 一站式桌面工具集，功能丰富、启动快、界面现代、无广告

            ---

            ### ⬇️ 下载安装包

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows 安装包 | `xtool_Setup.exe` | **推荐**，含安装向导、桌面快捷方式 |
            | 🪟 Windows 单文件 | `xtool.exe` | 免安装，双击即运行 |
            | 🐧 Linux DEB 包 | `xtool_*_amd64.deb` | Ubuntu/Debian 系（推荐） |
            | 🐧 Linux 压缩包 | `xtool_linux_amd64.tar.gz` | 通用 Linux，解压即用 |
            | 🍎 macOS Intel | `xtool_macos_amd64.dmg` | Intel 芯片 Mac |
            | 🍎 macOS Apple Silicon | `xtool_macos_arm64.dmg` | M1/M2/M3 芯片 Mac |

            ---

            ### 📋 系统要求

            - **Windows**：Windows 10/11（推荐 Win11 获得最佳云母效果）
            - **Linux**：Ubuntu 20.04+ / Debian 10+（需要 WebKit2GTK）
            - **macOS**：macOS 10.15 Catalina 及以上

            ---

            ### ✨ 主要功能

            <details>
            <summary>🛠️ 开发工具（11个）</summary>

            - JSON 格式化/压缩/校验/转义
            - XML / YAML 格式化
            - Base64 编码/解码
            - URL 编码/解码
            - MD5 / SHA1 / SHA256 加密
            - 文本对比、替换、统计
            - 二维码生成/解析
            - UUID 生成器
            - 时间戳 ↔ 日期时间互转
            - 正则表达式测试
            - 代码片段管理
            </details>

            <details>
            <summary>💻 系统工具（4个）</summary>

            - 主机信息（CPU/GPU/内存/磁盘）
            - 端口占用查看/一键释放
            - 进程管理
            - 文件批量重命名
            </details>

            <details>
            <summary>📱 日常工具（3个）</summary>

            - 计算器（标准+科学）
            - 单位换算（长度/重量/温度/速度）
            - 记事本/备忘录
            </details>

            <details>
            <summary>🌐 网络工具（4个）</summary>

            - Ping 测试
            - 内网 IP 扫描
            - HTTP 接口测试
            - Hosts 文件编辑
            </details>

            ---

            ### 🔐 文件校验和

            所有安装包 SHA256 校验和见 `checksums_all.txt`

            ---

            ### 📝 变更日志

            详见 [CHANGELOG.md](https://github.com/MasterPick/xtool/blob/main/CHANGELOG.md)
          files: |
            release-files/*.exe
            release-files/*.deb
            release-files/*.dmg
            release-files/*.tar.gz
            release-files/checksums_all.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          make_latest: true
