# GitHub Actions：多平台自动构建与发布工作流
# 触发条件：推送 v* 格式标签时自动执行
# 输出：
#   Windows → 万能工具箱_Setup.exe（NSIS 安装包）+ 万能工具箱.exe（单文件）
#   Linux   → universal-toolbox_linux_amd64.deb + universal-toolbox_linux_amd64.tar.gz
#   macOS   → universal-toolbox_macos.dmg

name: 🚀 多平台构建与发布

on:
  push:
    tags:
      - 'v*'
  # 手动触发（方便调试）
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v1.0.1）'
        required: false
        default: 'dev'

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '22'
  APP_NAME: '万能工具箱'
  APP_NAME_EN: 'universal-toolbox'

jobs:
  # ============================================================
  # Windows 构建：生成 .exe 单文件 + NSIS 安装包
  # ============================================================
  build-windows:
    name: 🪟 Windows 构建 (amd64)
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 Windows 单文件可执行程序
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -ldflags "-s" -o "${{ env.APP_NAME }}.exe"
          Write-Host "构建完成，build\bin 目录内容："
          Get-ChildItem -Path "build\bin" | Format-Table Name, Length -AutoSize
          # 确认 exe 文件存在
          $exe = Get-ChildItem -Path "build\bin" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "找到可执行文件: $($exe.FullName)，大小: $($exe.Length) 字节"
            # 将实际文件名写入 GITHUB_ENV 供后续步骤使用
            echo "ACTUAL_EXE_NAME=$($exe.Name)" >> $env:GITHUB_ENV
          } else {
            Write-Error "未找到 .exe 文件！"
            exit 1
          }

      - name: 安装 NSIS（制作安装包）
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # 刷新 PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          # 验证 NSIS 安装
          @("C:\Program Files (x86)\NSIS\makensis.exe", "C:\Program Files\NSIS\makensis.exe") | ForEach-Object {
            if (Test-Path $_) {
              Write-Host "NSIS found at: $_"
              $ver = & $_ /VERSION
              Write-Host "NSIS version: $ver"
            }
          }
          echo "NSIS 安装完成"

      - name: 生成 NSIS 安装脚本
        shell: pwsh
        run: |
          # 从环境变量获取实际的 exe 文件名（由前一步骤设置）
          $actualExeName = $env:ACTUAL_EXE_NAME
          if (-not $actualExeName) {
            Write-Error "ACTUAL_EXE_NAME 未设置，前一步骤可能失败了"
            exit 1
          }
          Write-Host "使用实际 exe 文件名: $actualExeName"
          
          # 再次验证文件存在
          if (-not (Test-Path "build\bin\$actualExeName")) {
            Write-Error "Build output not found: build\bin\$actualExeName"
            ls -Recurse build 2>/dev/null | head -20
            exit 1
          }
          Write-Host "Build output verified: build\bin\$actualExeName"
          
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $version) { $version = "1.0.0" }
          
          # 使用数组避免 here-string 的缩进问题
          # 注意：APP_EXE 定义为实际的 exe 文件名，不假设中文支持
          $lines = @(
            "; 万能工具箱 NSIS 安装脚本"
            "; 自动生成，请勿手动修改"
            ""
            "!define APP_NAME `"${{ env.APP_NAME }}`""
            "!define APP_VERSION `"$version`""
            "!define APP_PUBLISHER `"MasterPick`""
            "!define APP_URL `"https://github.com/MasterPick/universal-toolbox`""
            "!define APP_EXE `"$actualExeName`""
            "!define INSTALL_DIR `"`$PROGRAMFILES64\${{ env.APP_NAME }}`""
            ""
            "Name `"`${APP_NAME} v`${APP_VERSION}`""
            "OutFile `"build\bin\${{ env.APP_NAME }}_Setup.exe`""
            "Unicode True"
            "InstallDir `"`${INSTALL_DIR}`""
            "InstallDirRegKey HKLM `"Software\`${APP_NAME}`" `"`""
            "RequestExecutionLevel admin"
            "SetCompressor /SOLID lzma"
            ""
            "!include `"MUI2.nsh`""
            ""
            "!define MUI_ABORTWARNING"
            "!define MUI_ICON `"`${NSISDIR}\Contrib\Graphics\Icons\modern-install.ico`""
            "!define MUI_UNICON `"`${NSISDIR}\Contrib\Graphics\Icons\modern-uninstall.ico`""
            "!define MUI_WELCOMEFINISHPAGE_BITMAP `"`${NSISDIR}\Contrib\Graphics\Wizard\win.bmp`""
            "!define MUI_HEADERIMAGE"
            ""
            "!insertmacro MUI_PAGE_WELCOME"
            "!insertmacro MUI_PAGE_LICENSE `"LICENSE`""
            "!insertmacro MUI_PAGE_DIRECTORY"
            "!insertmacro MUI_PAGE_INSTFILES"
            "!define MUI_FINISHPAGE_RUN `"`$INSTDIR\`${APP_EXE}`""
            "!define MUI_FINISHPAGE_RUN_TEXT `"立即启动 `${APP_NAME}`""
            "!insertmacro MUI_PAGE_FINISH"
            ""
            "!insertmacro MUI_UNPAGE_CONFIRM"
            "!insertmacro MUI_UNPAGE_INSTFILES"
            ""
            "!insertmacro MUI_LANGUAGE `"SimpChinese`""
            ""
            "Section `"主程序`" SecMain"
            "  SectionIn RO"
            "  SetOutPath `"`$INSTDIR`""
            "  File `"build\bin\`${APP_EXE}`""
            "  File `"README.md`""
            "  File `"LICENSE`""
            ""
            "  ; 创建桌面快捷方式"
            "  CreateShortcut `"`$DESKTOP\`${APP_NAME}.lnk`" `"`$INSTDIR\`${APP_EXE}`""
            ""
            "  ; 创建开始菜单"
            "  CreateDirectory `"`$SMPROGRAMS\`${APP_NAME}`""
            "  CreateShortcut `"`$SMPROGRAMS\`${APP_NAME}\`${APP_NAME}.lnk`" `"`$INSTDIR\`${APP_EXE}`""
            "  CreateShortcut `"`$SMPROGRAMS\`${APP_NAME}\卸载 `${APP_NAME}.lnk`" `"`$INSTDIR\Uninstall.exe`""
            ""
            "  ; 写入注册表"
            "  WriteRegStr HKLM `"Software\`${APP_NAME}`" `"`" `"`$INSTDIR`""
            "  WriteRegStr HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\`${APP_NAME}`" `"DisplayName`" `"`${APP_NAME}`""
            "  WriteRegStr HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\`${APP_NAME}`" `"UninstallString`" `"`$INSTDIR\Uninstall.exe`""
            "  WriteRegStr HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\`${APP_NAME}`" `"DisplayVersion`" `"`${APP_VERSION}`""
            "  WriteRegStr HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\`${APP_NAME}`" `"Publisher`" `"`${APP_PUBLISHER}`""
            "  WriteRegStr HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\`${APP_NAME}`" `"URLInfoAbout`" `"`${APP_URL}`""
            ""
            "  ; 生成卸载程序"
            "  WriteUninstaller `"`$INSTDIR\Uninstall.exe`""
            "SectionEnd"
            ""
            "Section `"Uninstall`""
            "  Delete `"`$INSTDIR\`${APP_EXE}`""
            "  Delete `"`$INSTDIR\README.md`""
            "  Delete `"`$INSTDIR\LICENSE`""
            "  Delete `"`$INSTDIR\Uninstall.exe`""
            "  RMDir `"`$INSTDIR`""
            ""
            "  Delete `"`$DESKTOP\`${APP_NAME}.lnk`""
            "  Delete `"`$SMPROGRAMS\`${APP_NAME}\`${APP_NAME}.lnk`""
            "  Delete `"`$SMPROGRAMS\`${APP_NAME}\卸载 `${APP_NAME}.lnk`""
            "  RMDir `"`$SMPROGRAMS\`${APP_NAME}`""
            ""
            "  DeleteRegKey HKLM `"Software\`${APP_NAME}`""
            "  DeleteRegKey HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\`${APP_NAME}`""
            "SectionEnd"
          )
          
          $nsisScript = $lines -join "`n"
          [System.IO.File]::WriteAllText("$PWD\installer.nsi", $nsisScript, [System.Text.UTF8Encoding]::new($false))
          Write-Host "NSIS 脚本生成完成，行数: $($lines.Count)"
          
          # 验证脚本内容
          Write-Host "`n===== installer.nsi 关键行 ====="
          Get-Content "installer.nsi" | Select-String "!define APP_EXE" | ForEach-Object { Write-Host $_ }
          Get-Content "installer.nsi" | Select-String "File `"build" | ForEach-Object { Write-Host $_ }

      - name: 编译 NSIS 安装包
        shell: pwsh
        run: |
          # 调试：确认当前目录和文件状态
          Write-Host "当前工作目录: $PWD"
          Write-Host ""
          Write-Host "===== build\bin 目录内容 ====="
          Get-ChildItem -Path "build\bin" -Recurse | Format-Table Name, Length, FullName -AutoSize
          Write-Host ""

          # 确认 NSIS 脚本存在并显示关键行
          if (-not (Test-Path "installer.nsi")) {
            Write-Error "installer.nsi 不存在！"
            exit 1
          }
          Write-Host "===== installer.nsi 关键行（File 指令）====="
          Get-Content "installer.nsi" | Select-String "File " | ForEach-Object { Write-Host $_ }
          Write-Host ""

          # 确认 exe 文件存在
          $expectedExe = "build\bin\${{ env.APP_NAME }}.exe"
          Write-Host "期望的 exe 路径: $expectedExe"
          if (Test-Path $expectedExe) {
            $fileInfo = Get-Item $expectedExe
            Write-Host "文件存在！大小: $($fileInfo.Length) 字节"
          } else {
            Write-Error "文件不存在: $expectedExe"
            exit 1
          }

          # 尝试多个可能的 NSIS 安装路径
          $makensis = $null
          @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          ) | ForEach-Object {
            if (Test-Path $_) { $makensis = $_ }
          }
          
          if (-not $makensis) {
            Write-Error "makensis.exe not found!"
            exit 1
          }
          
          Write-Host "Using NSIS: $makensis"
          & $makensis /NOCD installer.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Error "NSIS compilation failed with exit code $LASTEXITCODE"
            exit 1
          }
          echo "安装包编译完成"
          dir build\bin

      - name: 计算文件哈希值
        shell: pwsh
        run: |
          $exeHash = (Get-FileHash "build\bin\${{ env.APP_NAME }}.exe" -Algorithm SHA256).Hash
          $setupHash = (Get-FileHash "build\bin\${{ env.APP_NAME }}_Setup.exe" -Algorithm SHA256).Hash
          Write-Host "单文件 SHA256: $exeHash"
          Write-Host "安装包 SHA256: $setupHash"
          "$exeHash  ${{ env.APP_NAME }}.exe`n$setupHash  ${{ env.APP_NAME }}_Setup.exe" | Out-File "build\bin\windows_checksums.txt"

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/bin/${{ env.APP_NAME }}.exe
            build/bin/${{ env.APP_NAME }}_Setup.exe
            build/bin/windows_checksums.txt
          retention-days: 7

  # ============================================================
  # Linux 构建：生成 .deb 包 + tar.gz 压缩包
  # ============================================================
  build-linux:
    name: 🐧 Linux 构建 (amd64)
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            gcc \
            pkg-config \
            dpkg-dev \
            fakeroot
          echo "系统依赖安装完成"

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 Linux 可执行文件
        run: |
          wails build -platform linux/amd64 -ldflags "-s" -o "${{ env.APP_NAME_EN }}"
          echo "Linux 构建完成"
          ls -la build/bin/

      - name: 打包为 tar.gz
        run: |
          cd build/bin
          tar -czf ${{ env.APP_NAME_EN }}_linux_amd64.tar.gz ${{ env.APP_NAME_EN }}
          echo "tar.gz 打包完成"

      - name: 制作 .deb 安装包
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          
          # 创建 deb 包目录结构
          DEB_DIR="${{ env.APP_NAME_EN }}_${VERSION}_amd64"
          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"
          mkdir -p "$DEB_DIR/usr/share/doc/${{ env.APP_NAME_EN }}"
          
          # 复制可执行文件
          cp build/bin/${{ env.APP_NAME_EN }} "$DEB_DIR/usr/bin/"
          chmod +x "$DEB_DIR/usr/bin/${{ env.APP_NAME_EN }}"
          
          # 复制文档
          cp README.md "$DEB_DIR/usr/share/doc/${{ env.APP_NAME_EN }}/"
          cp LICENSE "$DEB_DIR/usr/share/doc/${{ env.APP_NAME_EN }}/"
          
          # 生成 .desktop 文件（应用菜单图标）
          cat > "$DEB_DIR/usr/share/applications/${{ env.APP_NAME_EN }}.desktop" << EOF
          [Desktop Entry]
          Version=${VERSION}
          Name=万能工具箱
          Name[zh_CN]=万能工具箱
          Comment=一站式桌面工具集
          Comment[zh_CN]=一站式桌面工具集，功能丰富、启动快、界面现代
          Exec=/usr/bin/${{ env.APP_NAME_EN }}
          Icon=${{ env.APP_NAME_EN }}
          Terminal=false
          Type=Application
          Categories=Utility;Development;
          Keywords=toolbox;tools;developer;工具箱;
          StartupNotify=true
          EOF
          
          # 生成 DEBIAN/control 文件
          cat > "$DEB_DIR/DEBIAN/control" << EOF
          Package: ${{ env.APP_NAME_EN }}
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: MasterPick <masterpickself@outlook.com>
          Homepage: https://github.com/MasterPick/universal-toolbox
          Description: 万能工具箱 - 一站式桌面工具集
           功能丰富的跨平台桌面工具集，包含开发工具、系统工具、
           日常工具、网络工具等30+实用功能。
           .
           技术栈：Wails v2 + Go + Vue3 + TypeScript + TailwindCSS
          EOF
          
          # 生成 postinst 脚本（安装后执行）
          cat > "$DEB_DIR/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          set -e
          update-desktop-database /usr/share/applications 2>/dev/null || true
          echo "万能工具箱安装完成！可在应用菜单中找到，或运行：universal-toolbox"
          EOF
          chmod 755 "$DEB_DIR/DEBIAN/postinst"
          
          # 生成 prerm 脚本（卸载前执行）
          cat > "$DEB_DIR/DEBIAN/prerm" << 'EOF'
          #!/bin/bash
          set -e
          echo "正在卸载万能工具箱..."
          EOF
          chmod 755 "$DEB_DIR/DEBIAN/prerm"
          
          # 计算安装大小
          INSTALLED_SIZE=$(du -sk "$DEB_DIR" | cut -f1)
          echo "Installed-Size: $INSTALLED_SIZE" >> "$DEB_DIR/DEBIAN/control"
          
          # 构建 .deb 包
          fakeroot dpkg-deb --build "$DEB_DIR" "build/bin/${{ env.APP_NAME_EN }}_${VERSION}_amd64.deb"
          echo ".deb 包制作完成"
          ls -la build/bin/

      - name: 计算文件哈希值
        run: |
          cd build/bin
          sha256sum ${{ env.APP_NAME_EN }}_linux_amd64.tar.gz >> linux_checksums.txt
          sha256sum *.deb >> linux_checksums.txt
          cat linux_checksums.txt

      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/bin/${{ env.APP_NAME_EN }}_linux_amd64.tar.gz
            build/bin/*.deb
            build/bin/linux_checksums.txt
          retention-days: 7

  # ============================================================
  # macOS 构建：生成 .dmg 安装镜像
  # ============================================================
  build-macos:
    name: 🍎 macOS 构建 (amd64 + arm64)
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 整理 Go 模块依赖
        run: go mod tidy

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 macOS Intel (amd64) 应用
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          wails build -platform darwin/amd64 -ldflags "-s"
          mv build/bin/*.app build/bin/${{ env.APP_NAME_EN }}_intel.app 2>/dev/null || true
          echo "macOS amd64 构建完成"
          ls -la build/bin/

      - name: 构建 macOS Apple Silicon (arm64) 应用
        env:
          GOARCH: arm64
          CGO_ENABLED: 1
        run: |
          wails build -platform darwin/arm64 -ldflags "-s"
          mv build/bin/*.app build/bin/${{ env.APP_NAME_EN }}_arm64.app 2>/dev/null || true
          echo "macOS arm64 构建完成"
          ls -la build/bin/

      - name: 打包 Intel DMG
        run: |
          if [ -d "build/bin/${{ env.APP_NAME_EN }}_intel.app" ]; then
            # 重命名为 .app 用于 DMG 制作
            cp -R "build/bin/${{ env.APP_NAME_EN }}_intel.app" "build/bin/${{ env.APP_NAME_EN }}.app"
            
            hdiutil create \
              -volname "${{ env.APP_NAME_EN }}" \
              -srcfolder "build/bin/${{ env.APP_NAME_EN }}.app" \
              -ov \
              -format UDZO \
              -imagekey zlib-level=9 \
              "build/bin/${{ env.APP_NAME_EN }}_macos_amd64.dmg"
            
            rm -rf "build/bin/${{ env.APP_NAME_EN }}.app"
            echo "Intel DMG 创建完成"
          else
            echo "WARNING: Intel .app not found, skipping Intel DMG"
            ls -la build/bin/
          fi

      - name: 打包 Apple Silicon DMG
        run: |
          if [ -d "build/bin/${{ env.APP_NAME_EN }}_arm64.app" ]; then
            cp -R "build/bin/${{ env.APP_NAME_EN }}_arm64.app" "build/bin/${{ env.APP_NAME_EN }}.app"
            
            hdiutil create \
              -volname "${{ env.APP_NAME_EN }}" \
              -srcfolder "build/bin/${{ env.APP_NAME_EN }}.app" \
              -ov \
              -format UDZO \
              -imagekey zlib-level=9 \
              "build/bin/${{ env.APP_NAME_EN }}_macos_arm64.dmg"
            
            rm -rf "build/bin/${{ env.APP_NAME_EN }}.app"
            echo "Apple Silicon DMG 创建完成"
          else
            echo "WARNING: ARM64 .app not found, skipping ARM64 DMG"
            ls -la build/bin/
          fi

      - name: 计算文件哈希值
        run: |
          cd build/bin
          shasum -a 256 *.dmg > macos_checksums.txt
          cat macos_checksums.txt

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            build/bin/*.dmg
            build/bin/macos_checksums.txt
          retention-days: 7

  # ============================================================
  # 创建 GitHub Release，汇总所有平台安装包
  # ============================================================
  release:
    name: 📦 创建 GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    # 仅在推送标签时发布（不在手动触发时执行）
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: 查看构建产物列表
        run: |
          echo "========== 构建产物列表 =========="
          find dist/ -type f | sort
          echo "=================================="

      - name: 整理构建产物
        run: |
          mkdir -p release-files
          # 复制所有安装包到统一目录
          find dist/ -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*checksums*" \) \
            -exec cp {} release-files/ \;
          
          echo "========== 待发布文件 =========="
          ls -la release-files/
          echo "================================"

      - name: 合并校验和文件
        run: |
          cat release-files/*checksums* > release-files/checksums_all.txt 2>/dev/null || true
          echo "合并校验和完成"
          cat release-files/checksums_all.txt

      - name: 提取版本号
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传安装包
        uses: softprops/action-gh-release@v2
        with:
          name: "🎉 万能工具箱 ${{ github.ref_name }}"
          body: |
            ## 万能工具箱 ${{ github.ref_name }}
            
            > 一站式桌面工具集，功能丰富、启动快、界面现代、无广告

            ---
            
            ### ⬇️ 下载安装包
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows 安装包 | `万能工具箱_Setup.exe` | **推荐**，含安装向导、桌面快捷方式 |
            | 🪟 Windows 单文件 | `万能工具箱.exe` | 免安装，双击即运行 |
            | 🐧 Linux DEB 包 | `universal-toolbox_*_amd64.deb` | Ubuntu/Debian 系（推荐） |
            | 🐧 Linux 压缩包 | `universal-toolbox_linux_amd64.tar.gz` | 通用 Linux，解压即用 |
            | 🍎 macOS Intel | `universal-toolbox_macos_amd64.dmg` | Intel 芯片 Mac |
            | 🍎 macOS Apple Silicon | `universal-toolbox_macos_arm64.dmg` | M1/M2/M3 芯片 Mac |

            ---
            
            ### 📋 系统要求
            
            - **Windows**：Windows 10/11（推荐 Win11 获得最佳云母效果）
            - **Linux**：Ubuntu 20.04+ / Debian 10+（需要 WebKit2GTK）
            - **macOS**：macOS 10.15 Catalina 及以上

            ---
            
            ### ✨ 主要功能
            
            <details>
            <summary>🛠️ 开发工具（11个）</summary>
            
            - JSON 格式化/压缩/校验/转义
            - XML / YAML 格式化  
            - Base64 编码/解码
            - URL 编码/解码
            - MD5 / SHA1 / SHA256 加密
            - 文本对比、替换、统计
            - 二维码生成/解析
            - UUID 生成器
            - 时间戳 ↔ 日期时间互转
            - 正则表达式测试
            - 代码片段管理
            </details>
            
            <details>
            <summary>💻 系统工具（4个）</summary>
            
            - 主机信息（CPU/GPU/内存/磁盘）
            - 端口占用查看/一键释放
            - 进程管理
            - 文件批量重命名
            </details>
            
            <details>
            <summary>📱 日常工具（3个）</summary>
            
            - 计算器（标准+科学）
            - 单位换算（长度/重量/温度/速度）
            - 记事本/备忘录
            </details>
            
            <details>
            <summary>🌐 网络工具（4个）</summary>
            
            - Ping 测试
            - 内网 IP 扫描
            - HTTP 接口测试
            - Hosts 文件编辑
            </details>
            
            ---
            
            ### 🔐 文件校验和
            
            所有安装包 SHA256 校验和见 `checksums_all.txt`
            
            ---
            
            ### 📝 变更日志
            
            详见 [CHANGELOG.md](https://github.com/MasterPick/universal-toolbox/blob/main/CHANGELOG.md)
          files: |
            release-files/*.exe
            release-files/*.deb
            release-files/*.dmg
            release-files/*.tar.gz
            release-files/checksums_all.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          make_latest: true
