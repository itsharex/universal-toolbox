# XTool GoReleaser 配置
# 自动构建多平台二进制包并发布到 GitHub Release

version: 2

# 项目基础信息
project_name: xtool

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: xtool
    main: .
    binary: xtool
    # 支持三平台构建
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # 排除不支持的组合
    ignore:
      - goos: windows
        goarch: arm64
    # 构建时注入版本信息
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.gitCommit={{.Commit}}
    # 环境变量（CGO 用于 SQLite）
    env:
      - CGO_ENABLED=1

# Windows NSIS 安装包配置
nsis:
  - id: xtool-installer
    name: XTool {{.Version}} Setup
    publisher: MasterPick
    url: https://github.com/MasterPick/universal-toolbox
    homepage: https://github.com/MasterPick/universal-toolbox
    license: LICENSE
    display_name: XTool
    install_mode: currentUser
    # 使用项目自定义图标
    icon: build/windows/icon.ico
    uninstaller_icon: build/windows/icon.ico
    header_icon: build/windows/icon.ico
    sidebar_icon: build/windows/icon.ico
    # 安装目录
    install_dir: "{{.ProgramFiles}}\\XTool"
    # MUI2 设置
    mui:
      header_image: ""
      sidebar_image: ""
    # 自定义 NSIS 脚本（可选）
    extra_files:
      - README.md
      - LICENSE

# macOS DMG 配置
universal_binaries:
  - id: xtool-macos
    replace: true
    name_template: "xtool"

# macOS DMG 打包
dockers: []

# Linux 包管理器配置（.deb / .rpm）
nfpms:
  - id: linux-package
    package_name: xtool
    vendor: MasterPick
    homepage: https://github.com/MasterPick/universal-toolbox
    maintainer: MasterPick <masterpickself@outlook.com>
    description: XTool - One-stop Desktop Toolbox
    license: MIT
    # 运行时依赖
    dependencies:
      - libgtk-3-0
      - libwebkit2gtk-4.0-37
    formats:
      - deb
      - rpm
      - tar.gz
    # .desktop 文件
    contents:
      - src: build/linux/xtool.desktop
        dst: /usr/share/applications/xtool.desktop
        type: config
    overrides:
      deb:
        depends:
          - libgtk-3-0
          - libwebkit2gtk-4.0-37

# 存档打包
archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
      - goos: linux
        format: tar.gz
      - goos: darwin
        format: tar.gz
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

# macOS DMG 额外配置
# 注：GoReleaser 原生 DMG 支持有限，建议通过 GitHub Actions 单独生成

# 校验和
checksum:
  name_template: "checksums.txt"

# 变更日志
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

# 快照配置
snapshot:
  name_template: "{{.Tag}}-next"

# GitHub Release
release:
  github:
    owner: MasterPick
    name: universal-toolbox
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## XTool v{{.Version}}

    一站式全平台桌面工具集，为开发者与高级用户赋能。包含开发工具、系统工具、日常工具、网络工具等 40+ 功能。

    ### 下载说明
    - **Windows**: 下载 `*_windows_amd64.zip` 或 NSIS 安装包
    - **Linux**: 下载 `*_linux_amd64.tar.gz` 或 `.deb` 包
    - **macOS**: 下载 `*_darwin_amd64.tar.gz` 或 `*_darwin_arm64.tar.gz`
